<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 768" role="img" aria-labelledby="title desc">
  <title id="title">Notary service paperwork with car keys</title>
  <desc id="desc">Vehicle title paperwork, a notary stamp, pen, and car keys on a desk with blue automotive lighting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.45" stop-color="#0b1022"/>
      <stop offset="1" stop-color="#1244c8"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2546"/>
      <stop offset="1" stop-color="#304d98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1376" height="768" fill="url(#bg)"/>
  <path d="M0 565 C210 455 330 650 525 520 C720 390 830 450 1020 340 C1165 255 1270 252 1376 290 L1376 768 L0 768 Z" fill="#02040c" opacity="0.76"/>
  <path d="M260 305 C390 165 588 128 742 198 C842 244 923 265 1034 230 C1140 197 1230 206 1318 255" fill="none" stroke="#2f6cff" stroke-width="10" opacity="0.28" filter="url(#glow)"/>
  <ellipse cx="1050" cy="205" rx="240" ry="70" fill="none" stroke="#4777ff" stroke-width="4" opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="332" y="142" width="585" height="420" rx="20" fill="url(#paper)" transform="rotate(-7 624.5 352)"/>
    <rect x="395" y="205" width="420" height="22" rx="11" fill="#1244c8" opacity="0.92" transform="rotate(-7 605 216)"/>
    <rect x="405" y="275" width="365" height="12" rx="6" fill="#dbe6ff" opacity="0.75" transform="rotate(-7 587.5 281)"/>
    <rect x="416" y="322" width="385" height="12" rx="6" fill="#dbe6ff" opacity="0.68" transform="rotate(-7 608.5 328)"/>
    <rect x="428" y="370" width="275" height="12" rx="6" fill="#dbe6ff" opacity="0.68" transform="rotate(-7 565.5 376)"/>
    <rect x="438" y="420" width="320" height="12" rx="6" fill="#dbe6ff" opacity="0.62" transform="rotate(-7 598 426)"/>
    <circle cx="760" cy="453" r="58" fill="none" stroke="#ffffff" stroke-width="9" opacity="0.88" transform="rotate(-7 760 453)"/>
    <path d="M725 453 L750 478 L799 425" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-7 760 453)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="404" width="265" height="120" rx="18" fill="#111827" transform="rotate(8 852.5 464)"/>
    <rect x="762" y="438" width="184" height="25" rx="12" fill="#1244c8" transform="rotate(8 854 450.5)"/>
    <rect x="782" y="476" width="143" height="16" rx="8" fill="#eaf0ff" opacity="0.9" transform="rotate(8 853.5 484)"/>
  </g>

